<!doctype html>
<html lang="en" class="scroll-smooth">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery • Sfumato Pizzeria</title>
  <meta name="description" content="Photos from Sfumato Pizzeria — wood-fired pizzas, the oven, and the space." />
  <link rel="stylesheet" href="/assets/css/output.css" />
  <script src="https://kit.fontawesome.com/b8cf95d72b.js" crossorigin="anonymous"></script>
  <script src="/assets/js/mobileNavToggles.js" defer></script>

</head>

<body class="bg-zinc-50 text-zinc-900 antialiased">

  <header class="relative sticky top-0 z-50 border-b border-zinc-200/70 bg-white/80 backdrop-blur">
    <div class="mx-auto flex max-w-6xl items-center justify-between px-4 py-3 md:px-6">
      <a href="/" class="flex items-baseline gap-2" aria-label="Sfumato Pizzeria home">
        <span class="font-['Playfair_Display'] text-2xl font-bold tracking-tight">Sfumato</span>
        <span class="text-sm font-medium tracking-wide text-zinc-500">Pizzeria</span>
      </a>

      <nav class="hidden items-center gap-6 text-sm font-medium text-zinc-700 md:flex" aria-label="Primary">
        <a class="relative text-zinc-600" href="/">Home</a>
        <a class="relative text-zinc-600" href="/menu.html">Menu</a>
        <a class="relative text-zinc-600" href="/menu.html#drinks">Drinks</a>
        <a class="text-zinc-900 font-semibold pointer-events-none" href="/gallery.html" aria-current="page">Gallery</a>
        <a class="relative text-zinc-600" href="/#find-us">Find us</a>
        <a class="relative text-zinc-600" href="/#hours">Hours</a>
      </nav>

      <div class="flex items-center gap-3">
        <a href="tel:712-373-3007"
          class="hidden rounded-full bg-zinc-900 px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-zinc-800 md:inline-flex">
          Call 712-373-3007
        </a>

        <button id="mobileNavToggle"
          class="inline-flex items-center justify-center rounded-lg p-2 text-zinc-700 hover:bg-zinc-100 md:hidden"
          aria-controls="mobileNav" aria-expanded="false" aria-label="Toggle menu">
          <i class="fas fa-bars" aria-hidden="true"></i>
        </button>
      </div>
    </div>

    <!-- Mobile menu -->
    <div id="mobileNav" class="hidden md:hidden absolute left-0 right-0 top-full">
      <div class="border-t border-zinc-200 bg-white shadow-lg">
        <nav class="mx-auto flex max-w-6xl flex-col gap-2 px-4 py-4 text-base font-semibold text-zinc-800"
          aria-label="Mobile">
          <a class="rounded-lg px-3 py-2 hover:bg-zinc-50" href="/">Home</a>
          <a class="rounded-lg px-3 py-2 hover:bg-zinc-100" href="/menu.html">Menu</a>
          <a class="rounded-lg px-3 py-2 bg-zinc-100 font-semibold" href="/gallery.html" aria-current="page">Gallery</a>
          <a class="rounded-lg px-3 py-2 hover:bg-zinc-50" href="/#find-us">Find us</a>
          <a class="rounded-lg px-3 py-2 hover:bg-zinc-50" href="/#hours">Hours</a>

          <a class="mt-2 inline-flex items-center justify-center rounded-lg bg-zinc-900 px-4 py-3 text-white"
            href="tel:712-373-3007">
            Call 712-373-3007
          </a>
        </nav>
      </div>
    </div>
  </header>

  <main class="mx-auto max-w-6xl px-4 pb-16 md:px-6">
    <header class="relative pt-10">
      <div class="flex flex-col gap-3 sm:flex-row sm:items-end sm:justify-between">
        <div>
          <h1 class="font-['Playfair_Display'] text-4xl font-bold tracking-tight text-zinc-900 md:text-5xl">Gallery</h1>
          <p class="mt-2 text-zinc-600 w-[80%]">A peek inside the oven and what’s coming out of it.</p>
        </div>

        <a href="menu.html"
          class="inline-flex items-center gap-2 rounded-full bg-zinc-900 px-5 py-3 text-sm font-semibold text-white hover:bg-zinc-800">
          View menu <i class="fas fa-arrow-right" aria-hidden="true"></i>
        </a>
      </div>
    </header>

    <section class="mt-8 grid gap-4 sm:grid-cols-2 lg:grid-cols-3">
      <figure class="group overflow-hidden rounded-2xl border border-zinc-200 bg-white shadow-sm">
        <div class="h-[300px] overflow-hidden">
          <img src="/assets/images/pizza_w_pinapple.jpg" alt="Close-up of a pizza with pineapple"
            class="h-full w-full object-cover transition-transform duration-300 group-hover:scale-[1.03]" loading="lazy"
            decoding="async">
        </div>
      </figure>

      <figure class="group overflow-hidden rounded-2xl border border-zinc-200 bg-white shadow-sm">
        <div class="h-[300px] overflow-hidden">
          <img src="/assets/images/pizza_one.png" alt="Close-up of a Margherita pizza"
            class="h-full w-full object-cover transition-transform duration-300 group-hover:scale-[1.03]" loading="lazy"
            decoding="async">
        </div>
      </figure>

      <figure class="group overflow-hidden rounded-2xl border border-zinc-200 bg-white shadow-sm">
        <div class="h-[300px] overflow-hidden">
          <img src="/assets/images/sfumato_oven_2.png" alt="Pizzas baking in the wood-fired oven"
            class="h-full w-full object-cover transition-transform duration-300 group-hover:scale-[1.03]" loading="lazy"
            decoding="async">
        </div>
      </figure>

      <figure class="group overflow-hidden rounded-2xl border border-zinc-200 bg-white shadow-sm">
        <div class="h-[300px] overflow-hidden">
          <img src="/assets/images/sfumato_drink.jpg" alt="A refreshing drink at Sfumato Pizzeria"
            class="h-full w-full object-cover transition-transform duration-300 group-hover:scale-[1.03]" loading="lazy"
            decoding="async">
        </div>
      </figure>

      <figure class="group overflow-hidden rounded-2xl border border-zinc-200 bg-white shadow-sm">
        <div class="h-[300px] overflow-hidden">
          <img src="/assets/images/sfumato_rest.jpg" alt="Exterior view of Sfumato Pizzeria"
            class="h-full w-full object-cover transition-transform duration-300 group-hover:scale-[1.03]" loading="lazy"
            decoding="async">
        </div>
      </figure>

      <figure class="group overflow-hidden rounded-2xl border border-zinc-200 bg-white shadow-sm">
        <div class="h-[300px] overflow-hidden">
          <img src="/assets/images/the_team.jpg" alt="The team at Sfumato Pizzeria"
            class="h-full w-full object-cover transition-transform duration-300 group-hover:scale-[1.03]" loading="lazy"
            decoding="async">
        </div>
      </figure>
    </section>

    <figure class="group overflow-hidden rounded-2xl border border-zinc-200 bg-white shadow-sm mt-4">
        <div class="h-[300px] overflow-hidden">
          <img src="/assets/images/logo-legacy.png" alt="Legacy logo for Sfumato Pizzeria"
            class="h-full w-full object-contain transition-transform duration-300 group-hover:scale-[1.03]" loading="lazy"
            decoding="async">
        </div>
      </figure>
  
  </main>

  <footer class="relative overflow-hidden border-t border-zinc-200 bg-white">
    <!-- Legacy logo watermark -->
    <img src="/assets/images/logo-legacy.png" alt="" aria-hidden="true" class="
      pointer-events-none
      absolute inset-0 m-auto
      h-36 md:h-36
      opacity-[0.04]
      select-none
    " />

    <div class="relative z-10 mx-auto max-w-6xl px-4 py-10 md:px-6">
      <div class="
        flex flex-wrap items-center justify-center gap-x-6 gap-y-3
        text-center
      ">
        <!-- Footer nav -->
        <nav class="flex flex-wrap items-center justify-center gap-x-6 gap-y-2 text-sm font-medium text-zinc-600">
          <a href="/" class="relative text-zinc-600">Home</a>
          <a href="/menu.html" class="relative text-zinc-600">Menu</a>
          <a href="/gallery.html" class="relative text-zinc-600">Gallery</a>
          <a href="/#reviews" class="relative text-zinc-600">Reviews</a>
          <a href="/#find-us" class="relative text-zinc-600">Find us</a>
          <a href="/#hours" class="relative text-zinc-600">Hours</a>
        </nav>

        <!-- Divider (desktop only) -->
        <span class="hidden h-4 w-px bg-zinc-300 md:block"></span>

        <!-- Copyright -->
        <p class="text-sm text-zinc-500">
          ©
          <script>document.write(new Date().getFullYear());</script> Sfumato Pizzeria
        </p>
      </div>
    </div>
  </footer>
</body>

</html>
